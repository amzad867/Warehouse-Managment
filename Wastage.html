<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🗑️ Daily Wastage Form</h1>

    <form id="wastageForm">

        <label for="itemNo">Item Number</label>
        <input
            type="text"
            id="itemNo"
            required>

        <label for="quantity">Quantity</label>
        <input
            type="number"
            id="quantity"
            min="1"
            required>

        <label for="reason">Reason</label>
        <select id="reason" required>
            <option value="">Select Reason</option>
            <option>Damage</option>
            <option>Expire</option>
            <option>Recall</option>
        </select>

        <label for="resource">Resource</label>
        <select id="resource" required>
            <option value="">Select Resource</option>
            <option>Ambient</option>
            <option>Chiller</option>
            <option>Freezer</option>
        </select>

        <label for="expireDate">Expiry Date</label>
        <input
            type="date"
            id="expireDate"
            required>

        <label for="responsible">Responsible Person</label>
        <input
            type="text"
            id="responsible"
            required>

        <label for="photo">Waste Photo</label>

        <input
            type="file"
            id="photo"
            accept="image/*">

        <img
            id="preview"
            src=""
            style="display:none;width:100%;max-height:250px;margin-top:15px;border-radius:12px;object-fit:cover;">

        <button type="submit" id="submitBtn">
            Submit
        </button>

    </form>

    <script src="script-wastage.js"></script>

</body>

</html>
