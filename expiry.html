<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expiry Check</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">

        <h1><br>📅<br> Expiry Check</h1>

        <form id="expiryForm">

            <label for="itemNo">Item Number</label>
            <input
                type="number"
                id="itemNo"
                placeholder="Enter Item Number"
                autocomplete="off"
                required
            >

            <label for="expiryDate">Expiry Date</label>
            <input
                type="date"
                id="expiryDate"
                required
            >

            <label for="shelf">Shelf Number</label>
            <input
                type="text"
                id="shelf"
                placeholder="Enter Shelf Number"
                autocomplete="off"
                required
            >

            <button type="submit" id="submitBtn">
                Save Expiry
            </button>

        </form>

    </div>

    <script src="script-expiry.js"></script>

</body>
</html>
