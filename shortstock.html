<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Stock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1><br>📦<br> Short Stock Form</h1>
<div class="form-container">
<form id="shortstockForm">

    <label for="itemNo">Item Number</label>
    <input type="text" id="itemNo" >

    <label for="shelf">Shelf</label>
    <input type="text" id="shelf" >

    <label for="shortQuantity">Short Quantity</label>
    <input type="number" id="shortQuantity" min="1" >

    <button type="submit" id="submitBtn">Submit</button>

</form>

<script src="script-shortstock.js"></script>

</body>
</html>
