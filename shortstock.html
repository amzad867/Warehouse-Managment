<!DOCTYPE html>
<html>
<head>
    <title>Short Stock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Short Stock Form</h1>

<form id="shortstockForm">

   <label for="itemNo">Item Number</label>
        <input type="text" id="itemNo" required>

        <label for="shelf">Shelf</label>
        <input type="text" id="shelf" required>

        <label for="shortQuantity">Short Quantity</label>
        <input type="number" id="shortQuantity" min="1" required>

        <button type="submit">Submit</button>

</form>

<script src="script-shortstock.js"></script>

</body>
</html>
